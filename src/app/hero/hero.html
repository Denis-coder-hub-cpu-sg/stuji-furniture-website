<section class="hero">

  <!-- Left Content -->
  <div class="hero-content">

    <!-- Step 2: Strong Headline -->
    <span class="hero-badge">🔥 New Collection 2026</span>
    <h1 class="hero-title">
      Transform Your Home With
      <span class="highlight">Quality Furniture</span>
    </h1>

    <!-- Step 3: Sub-Headline -->
    <p class="hero-subtitle">
      Premium designs at unbeatable prices. Modern, stylish, and built to last.
    </p>

    <!-- Step 4: CTA Buttons -->
    <div class="hero-buttons">
      <a routerLink="/products" class="btn-primary">🛍️ Shop Now</a>
      <a routerLink="/products" [queryParams]="{category: 'Furniture'}">Shop Furniture</a>
      <a routerLink="/products" class="btn-secondary">✨ Explore Products</a>
    </div>

    <!-- Trust Badges -->
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-number">500+</span>
        <span class="stat-label">Happy Customers</span>
      </div>
      <div class="divider-stat"></div>
      <div class="stat">
        <span class="stat-number">4.8★</span>
        <span class="stat-label">Average Rating</span>
      </div>
      <div class="divider-stat"></div>
      <div class="stat">
        <span class="stat-number">24h</span>
        <span class="stat-label">Fast Delivery</span>
      </div>
    </div>

  </div>

  <!-- Right Content - Product Image -->
  <div class="hero-image">
    <div class="image-wrapper">
      <img src="images/product1.jpg" alt="Console Table + Mirror"/>
      <div class="image-badge">
        <span class="badge-price">KSh 19,000</span>
        <span class="badge-label">Console Table + Mirror</span>
      </div>
    </div>
  </div>

</section>
<app-testimonials></app-testimonials>

<app-newsletter></app-newsletter>
